<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14</title>
</head>
<body>
    <h1>Duplicar números</h1>
    <script>
        const duplicar = (arr) => {
            let nuevoArreglo = [];
            for (let i = 0; i < arr.length; i++) {
                nuevoArreglo.push(arr[i] * 2);
            }
            return nuevoArreglo;
        }

        let cantidad = parseInt(prompt("¿Cuántos números desea ingresar en el arreglo?"));
        if (isNaN(cantidad) || cantidad <= 0) {
            document.write(`Debe ingresar una cantidad válida.`);
        } else {
            let numeros = [];

        for (let i = 0; i < cantidad; i++) {
            let num = parseFloat(prompt(`Ingrese el número ${i + 1}:`));
            if (isNaN(num)) {
                document.write(`El valor ingresado no es válido.<br>`);
                numeros.push(0);
            } else {
                numeros.push(num);
            }
        }

        let duplicados = duplicar(numeros);

        document.write(`Arreglo original: ${numeros.join(", ")} <br>`);
        document.write(`Arreglo duplicado:${duplicados.join(", ")}`);
        }
    </script>
</body>
</html>
