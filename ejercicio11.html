<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 11</title>
</head>
<body>

    <h1>Consumo de combustible</h1>
    <script>
        let km = parseFloat(prompt("Ingrese los kilómetros recorridos:"));
        let litros = parseFloat(prompt("Ingrese los litros de combustible consumidos:"));

        if (isNaN(km) || isNaN(litros) || km <= 0) {
            document.write(`Ingrese valores válidos.`);
        } else {
            let consumo = litros / km;

            document.write(`Total consumo de combustible por kilómetro: ${consumo.toFixed(2)}`);
        }
    </script>

</body>
</html>
