    <script>
        let numero = parseInt(prompt("Ingrese un número:"));
        if (isNaN(numero)) {
            document.write(`Debe ingresar un número válido.`);
        } else {
            if (numero % 2 === 0) {
                document.write(`El número ${numero} es PAR.`);
            } else {
                document.write(`El número ${numero} es IMPAR.`);
            }
        }
    </script>
