<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 15</title>
</head>
<body>
    <h1>Retornar Mes</h1>
    <script>
        const retornarMes = (numero) => {
            const meses = [ "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            if (numero >= 1 && numero <= 12) {
                return meses[numero - 1];
            } else {
                return "El número ingresado no corresponde a un mes.";
            }
        }

        let numeroMes = parseInt(prompt("Ingrese un número (1-12):"));
        if (isNaN(numeroMes)) {
            document.write(`Debe ingresar un número válido.`);
        } else {
            let resultado = retornarMes(numeroMes);
            document.write(`El mes es: ${resultado}`);
        }
    </script>
</body>
</html>
