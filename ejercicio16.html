    <script>
        const sumarRango = (numInicial, numFinal) => {
            let suma = 0;
            for (let i = numInicial; i <= numFinal; i++) {
                suma += i;
            }
            return suma;
        };

        let numInicial;
        let numFinal;

        do {
            numInicial = Number(prompt("Ingrese el número inicial:"));
            numFinal = Number(prompt("Ingrese el número final:"));
            if (numInicial > numFinal) {
                alert("El número inicial debe ser menor o igual que el número final.");
            }
        } while (numInicial > numFinal);

        const resultado = sumarRango(numInicial, numFinal);

        document.write(`<p>La suma del rango entre ${numInicial} y ${numFinal} es: ${resultado}</p>`);
    </script>
